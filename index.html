  <!-- Section Loader
         Fetches each section/*.html file and replaces its placeholder <div>.
         script.js is loaded AFTER all sections are in the DOM so the
         IntersectionObserver (reveal) and smooth-scroll logic bind correctly. -->
  <script>
    (async function loadSections() {
      const sections = [
        { id: 'section-hero', file: 'section/hero.html' },
        { id: 'section-trust', file: 'section/trust.html' },
        { id: 'section-about', file: 'section/about.html' },
        { id: 'section-press', file: 'section/press.html' },
        { id: 'section-menu', file: 'section/menu.html' },
        { id: 'section-specials', file: 'section/specials.html' },
        { id: 'section-gallery', file: 'section/gallery.html' },
        { id: 'section-contact', file: 'section/contact.html' },
      ];

      await Promise.all(
        sections.map(async ({ id, file }) => {
          try {
            const res = await fetch(file);
            if (!res.ok) throw new Error(res.statusText);
            const html = await res.text();
            const el = document.getElementById(id);
            if (el) el.outerHTML = html;
          } catch (e) {
            console.warn('Could not load section:', file, e);
          }
        })
      );

      // All sections injected — now load script.js
      const s = document.createElement('script');
      s.src = 'script.js';
      document.body.appendChild(s);
    })();
  </script>
</body>
